<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OBS Timer</title>
    <style>
      :root {
        --x: 50vw;
        --y: 48vh;
        --scale: 1;
        --visibility: 1;
        --projector-opacity: 0.48;
        --core-alpha: 0.48;
        --wash-alpha: 0.24;
        --bloom-alpha: 0.58;
        --break-alpha: 0;
        --warm-r: 238;
        --warm-g: 242;
        --warm-b: 241;
        --blur-core: 0.72px;
        --blur-bloom: 17px;
        --glow: 62px;
        --label-size: 1.18;
        --time-size: 1;
        --rot-y: -3deg;
        --rot-x: 1.2deg;
        --rot-z: -0.55deg;
        --settle: 700ms;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html[data-preview="1"] body {
        background:
          radial-gradient(ellipse at 58% 42%, rgba(82, 90, 90, 0.86), rgba(33, 37, 38, 0.97) 62%, rgba(13, 15, 16, 1) 100%),
          linear-gradient(108deg, rgba(155, 175, 190, 0.12), transparent 38%, rgba(38, 44, 52, 0.18) 78%),
          #2f3535;
      }

      html[data-preview="1"][data-ambient="dim"] body {
        background:
          radial-gradient(ellipse at 54% 38%, rgba(55, 63, 66, 0.92), rgba(20, 23, 25, 0.99) 66%, rgba(8, 10, 11, 1) 100%),
          linear-gradient(116deg, rgba(90, 120, 150, 0.12), transparent 42%, rgba(16, 22, 30, 0.22) 84%),
          #1d2224;
      }

      html[data-preview="1"][data-ambient="bright"] body {
        background:
          radial-gradient(ellipse at 52% 45%, rgba(116, 122, 119, 0.92), rgba(58, 62, 60, 0.98) 70%, rgba(32, 35, 34, 1) 100%),
          linear-gradient(102deg, rgba(210, 222, 226, 0.16), transparent 44%, rgba(56, 61, 64, 0.16) 86%),
          #4a4f4d;
      }

      html[data-preview="1"] body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 24% 36%, rgba(190, 210, 230, 0.08), transparent 18%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.022) 0 1px, transparent 1px 8px),
          repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.032) 0 1px, transparent 1px 6px);
        opacity: 0.7;
        pointer-events: none;
      }

      #obsTimer {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        perspective: 1200px;
        transform-style: preserve-3d;
        opacity: var(--visibility);
        color: rgb(var(--warm-r), var(--warm-g), var(--warm-b));
        font-family:
          "Helvetica Neue",
          "Inter",
          "Avenir Next",
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      #throwCone {
        position: absolute;
        left: calc(var(--x) - 44vw);
        top: calc(var(--y) - 27vh);
        width: 88vw;
        height: 54vh;
        opacity: calc(var(--wash-alpha) * 0.82);
        transform:
          rotateX(var(--rot-x))
          rotateY(var(--rot-y))
          rotateZ(var(--rot-z))
          scale(var(--scale));
        transform-origin: 50% 50%;
        clip-path: polygon(8% 18%, 95% 6%, 100% 88%, 0 98%);
        background:
          radial-gradient(
            ellipse at 48% 48%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.58) 0%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.28) 32%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.09) 61%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0) 100%
          );
        filter: blur(46px);
        -webkit-mask-image: radial-gradient(ellipse at 49% 48%, #000 0%, rgba(0, 0, 0, 0.86) 42%, rgba(0, 0, 0, 0.34) 70%, transparent 96%);
        mask-image: radial-gradient(ellipse at 49% 48%, #000 0%, rgba(0, 0, 0, 0.86) 42%, rgba(0, 0, 0, 0.34) 70%, transparent 96%);
      }

      #wallWash {
        position: absolute;
        left: calc(var(--x) - 40vw);
        top: calc(var(--y) - 23vh);
        width: 80vw;
        height: 46vh;
        opacity: var(--wash-alpha);
        transform:
          rotateX(var(--rot-x))
          rotateY(var(--rot-y))
          rotateZ(var(--rot-z))
          scale(var(--scale));
        transform-origin: 50% 50%;
        clip-path: polygon(5% 12%, 96% 4%, 100% 86%, 0 96%);
        background:
          radial-gradient(
            ellipse at 48% 48%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.58) 0%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.36) 24%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.14) 52%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0) 100%
          ),
          radial-gradient(
            ellipse at 34% 52%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.13) 0%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.055) 38%,
            rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0) 82%
          ),
          linear-gradient(
            102deg,
            rgba(208, 222, 232, 0) 0%,
            rgba(232, 239, 241, 0.065) 48%,
            rgba(208, 222, 232, 0) 100%
          );
        filter: blur(36px);
        -webkit-mask-image: radial-gradient(ellipse at 48% 49%, #000 0%, rgba(0, 0, 0, 0.92) 34%, rgba(0, 0, 0, 0.42) 66%, transparent 97%);
        mask-image: radial-gradient(ellipse at 48% 49%, #000 0%, rgba(0, 0, 0, 0.92) 34%, rgba(0, 0, 0, 0.42) 66%, transparent 97%);
      }

      #edgeFalloff {
        position: absolute;
        left: calc(var(--x) - 41vw);
        top: calc(var(--y) - 24vh);
        width: 82vw;
        height: 48vh;
        opacity: 0.12;
        transform:
          rotateX(var(--rot-x))
          rotateY(var(--rot-y))
          rotateZ(var(--rot-z))
          scale(var(--scale));
        transform-origin: 50% 50%;
        clip-path: polygon(4% 10%, 96% 3%, 100% 88%, 0 98%);
        background:
          radial-gradient(
            ellipse at 50% 48%,
            rgba(0, 0, 0, 0) 0%,
            rgba(0, 0, 0, 0) 52%,
            rgba(0, 0, 0, 0.26) 100%
          );
        filter: blur(19px);
        mix-blend-mode: multiply;
        -webkit-mask-image: radial-gradient(ellipse at 49% 49%, transparent 0%, rgba(0, 0, 0, 0.22) 56%, #000 100%);
        mask-image: radial-gradient(ellipse at 49% 49%, transparent 0%, rgba(0, 0, 0, 0.22) 56%, #000 100%);
      }

      #content,
      #bloom {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: min(56vw, 760px);
        max-width: calc(100vw - 40px);
        text-align: center;
        transform:
          translate3d(-50%, -50%, 0)
          rotateX(var(--rot-x))
          rotateY(var(--rot-y))
          rotateZ(var(--rot-z))
          scale(var(--scale));
        transform-origin: 50% 50%;
      }

      #content {
        z-index: 4;
        opacity: var(--core-alpha);
        filter:
          blur(var(--blur-core))
          drop-shadow(0 0 calc(var(--glow) * 0.28) rgba(var(--warm-r), var(--warm-g), var(--warm-b), 0.58));
        transition:
          opacity var(--settle) ease,
          filter var(--settle) ease;
      }

      #bloom {
        z-index: 3;
        opacity: var(--bloom-alpha);
        filter:
          blur(var(--blur-bloom))
          drop-shadow(0 0 calc(var(--glow) * 1.45) rgba(228, 238, 242, 0.46));
        transition:
          opacity var(--settle) ease,
          filter var(--settle) ease;
      }

      .label,
      .time,
      .sub {
        display: block;
        margin: 0;
        color: rgb(var(--warm-r), var(--warm-g), var(--warm-b));
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        font-variant-ligatures: common-ligatures;
        text-shadow:
          0 0 1px rgba(255, 255, 255, 0.55),
          0 0 11px rgba(232, 240, 242, 0.38),
          0 0 31px rgba(218, 230, 234, 0.18);
      }

      .label {
        margin-bottom: 0.48em;
        font-size: clamp(13px, calc(1.2vw * var(--label-size)), 23px);
        font-weight: 460;
        line-height: 1.1;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .time {
        font-family:
          "Neue Haas Grotesk Text",
          "Helvetica Neue",
          "Inter",
          "Segoe UI",
          system-ui,
          sans-serif;
        font-size: clamp(54px, calc(8.6vw * var(--time-size)), 148px);
        font-weight: 230;
        line-height: 0.9;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums lining-nums;
      }

      .sub {
        min-height: 1.2em;
        margin-top: 0.72em;
        font-size: clamp(13px, 1.28vw, 21px);
        font-weight: 330;
        line-height: 1.2;
        letter-spacing: 0;
        opacity: calc(var(--break-alpha) * 1.15);
        text-transform: lowercase;
        transition: opacity 520ms ease;
      }

      #bloom .label,
      #bloom .time,
      #bloom .sub {
        text-shadow:
          0 0 13px rgba(238, 244, 245, 0.48),
          0 0 38px rgba(222, 233, 237, 0.28),
          0 0 74px rgba(210, 225, 231, 0.16);
      }

      #texture {
        position: absolute;
        inset: -8%;
        z-index: 5;
        opacity: calc(var(--projector-opacity) * 0.42);
        background:
          linear-gradient(92deg, transparent 0%, rgba(255, 255, 255, 0.08) 24%, transparent 25%, transparent 100%),
          repeating-linear-gradient(88deg, rgba(255, 255, 255, 0.026) 0 1px, transparent 1px 10px),
          repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.028) 0 1px, transparent 1px 7px);
        filter: blur(0.6px);
        mix-blend-mode: overlay;
      }

      #dust {
        position: absolute;
        inset: -10%;
        z-index: 6;
        opacity: calc(var(--projector-opacity) * 0.28);
        background:
          radial-gradient(circle at 18% 32%, rgba(255, 255, 255, 0.24) 0 0.045%, transparent 0.14%),
          radial-gradient(circle at 35% 62%, rgba(255, 255, 255, 0.16) 0 0.035%, transparent 0.12%),
          radial-gradient(circle at 63% 24%, rgba(255, 255, 255, 0.18) 0 0.04%, transparent 0.13%),
          radial-gradient(circle at 79% 71%, rgba(255, 255, 255, 0.13) 0 0.035%, transparent 0.12%);
        filter: blur(0.7px);
      }

      #cameraSampler,
      #sampleCanvas,
      #status {
        position: fixed;
        width: 1px;
        height: 1px;
        left: -10px;
        top: -10px;
        opacity: 0;
        pointer-events: none;
      }

      html[data-status="1"] #status {
        left: 16px;
        top: 16px;
        width: auto;
        height: auto;
        max-width: 420px;
        opacity: 0.82;
        padding: 8px 10px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.58);
        color: rgba(245, 250, 255, 0.92);
        font: 12px/1.35 "Segoe UI", system-ui, sans-serif;
      }

      @media (max-width: 760px) {
        :root {
          --y: 47vh;
          --scale: 0.92;
        }

        #content,
        #bloom {
          width: min(82vw, 620px);
        }
      }
    </style>
  </head>
  <body>
    <main id="obsTimer" aria-label="Projected work timer">
      <div id="throwCone"></div>
      <div id="wallWash"></div>
      <div id="edgeFalloff"></div>
      <div id="bloom" aria-hidden="true">
        <p class="label">DESK TIME</p>
        <time class="time" data-bloom-time>00:00:00</time>
        <p class="sub" data-bloom-break>bathroom break</p>
      </div>
      <div id="content">
        <p class="label" data-label>DESK TIME</p>
        <time class="time" data-time>00:00:00</time>
        <p class="sub" data-break>bathroom break</p>
      </div>
      <div id="texture"></div>
      <div id="dust"></div>
    </main>
    <video id="cameraSampler" muted playsinline></video>
    <canvas id="sampleCanvas" width="96" height="54"></canvas>
    <output id="status" aria-live="polite"></output>

    <script>
      (() => {
        const root = document.documentElement;
        const timer = document.querySelector("[data-time]");
        const bloomTimer = document.querySelector("[data-bloom-time]");
        const label = document.querySelector("[data-label]");
        const status = document.querySelector("#status");
        const video = document.querySelector("#cameraSampler");
        const canvas = document.querySelector("#sampleCanvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const params = new URLSearchParams(window.location.search);
        const preview = params.get("preview") === "1";
        const cameraEnabled = params.get("camera") === "1";
        const helperEnabled = params.get("helper") !== "0";
        const helperUrl = params.get("helperUrl") || "http://127.0.0.1:8765/state";
        const autoPause = params.get("autoPause") !== "0";
        const initialBreak = params.get("state") === "break";
        const controlStorageKey = "obs-projector-controls-v2";
        const savedControls = readControls();
        const modeInput = String(params.get("level") || params.get("mode") || params.get("brightness") || savedControls.level || "4").toLowerCase();
        const pauseInput = clampNumber(params.get("pause") || params.get("pauseDelay"), 3, 1.2, 12);
        const resumeInput = clampNumber(params.get("resume") || params.get("resumeDelay"), 0.5, 0.2, 4);
        const pauseDelay = pauseInput < 20 ? pauseInput * 1000 : pauseInput;
        const resumeDelay = resumeInput < 20 ? resumeInput * 1000 : resumeInput;
        let powerControl = clampNumber(params.get("power") || savedControls.power, 1.18, 0.55, 2.2);
        let bloomControl = clampNumber(params.get("bloom") || savedControls.bloom, 1.28, 0.65, 2.2);
        let blurControl = clampNumber(params.get("blur") || savedControls.blur, 1.22, 0.65, 1.85);
        let labelControl = clampNumber(params.get("label") || savedControls.label, 1.22, 0.85, 1.8);
        let timeControl = clampNumber(params.get("time") || savedControls.time, 1, 0.82, 1.35);
        const storageKey = "obs-projector-desk-time-ms-v1";
        const demoSeconds = Number(params.get("demoSeconds") || 0);
        const demoMode = preview || demoSeconds > 0;
        const saveTimer = params.get("save") === "1" || params.get("persist") === "1";
        const lightProfiles = {
          day: {
            core: [0.32, 0.46],
            wash: [0.14, 0.27],
            bloom: [0.30, 0.56],
            blur: [0.34, 0.74],
            bloomBlur: [9.2, 16.5],
            glow: [31, 58],
            warm: [238, 244, 244]
          },
          boost: {
            core: [0.56, 0.74],
            wash: [0.24, 0.42],
            bloom: [0.60, 0.88],
            blur: [0.46, 0.98],
            bloomBlur: [16.5, 27],
            glow: [68, 116],
            warm: [239, 245, 245]
          },
          ultra: {
            core: [0.70, 0.88],
            wash: [0.31, 0.52],
            bloom: [0.76, 1.0],
            blur: [0.52, 1.12],
            bloomBlur: [20, 34],
            glow: [88, 148],
            warm: [240, 246, 246]
          },
          normal: {
            core: [0.24, 0.38],
            wash: [0.10, 0.22],
            bloom: [0.24, 0.46],
            blur: [0.40, 0.84],
            bloomBlur: [8.4, 15.2],
            glow: [25, 52],
            warm: [238, 243, 243]
          },
          night: {
            core: [0.18, 0.31],
            wash: [0.075, 0.18],
            bloom: [0.20, 0.38],
            blur: [0.48, 0.94],
            bloomBlur: [7.4, 13.6],
            glow: [20, 42],
            warm: [238, 242, 241]
          }
        };
        let brightnessMode = resolveMode(modeInput);
        let profile = lightProfiles[brightnessMode] || lightProfiles.boost;
        let activeMs = demoSeconds > 0 ? demoSeconds * 1000 : saveTimer ? Number(localStorage.getItem(storageKey) || 0) : 0;
        let lastTick = performance.now();
        let lastSave = 0;
        let paused = initialBreak;
        let cameraReady = false;
        let lastFaceAt = 0;
        let absenceSince = 0;
        let returnSince = 0;
        let baseline = null;
        let baselineFrames = 0;
        let lastLuma = null;
        let faceDetector = null;
        let sampleBusy = false;
        let cameraError = "";
        let presenceScore = 1;
        let syntheticBrightness = params.get("ambient") === "bright" ? 0.72 : params.get("ambient") === "dim" ? 0.24 : 0.48;
        let lastSeenLuma = syntheticBrightness;
        let helperOnline = false;
        let helperCameraOk = false;
        let manualPause = initialBreak;
        let helperPaused = false;
        let manualReleaseUntil = 0;

        if (preview) {
          root.dataset.preview = "1";
          root.dataset.ambient = params.get("ambient") || "dim";
        }

        root.dataset.mode = brightnessMode;
        if (params.get("status") === "1" || params.get("debug") === "1") {
          root.dataset.status = "1";
        }
        if (params.has("x")) root.style.setProperty("--x", params.get("x"));
        if (params.has("y")) root.style.setProperty("--y", params.get("y"));
        if (params.has("scale")) root.style.setProperty("--scale", params.get("scale"));
        root.style.setProperty("--label-size", labelControl.toFixed(2));
        root.style.setProperty("--time-size", timeControl.toFixed(2));

        if (params.get("reset") === "1") {
          localStorage.removeItem(storageKey);
          activeMs = demoSeconds > 0 ? demoSeconds * 1000 : 0;
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function clampNumber(value, fallback, min, max) {
          const number = Number(value);
          return Number.isFinite(number) ? clamp(number, min, max) : fallback;
        }

        function readControls() {
          try {
            return JSON.parse(localStorage.getItem(controlStorageKey) || "{}") || {};
          } catch (_) {
            return {};
          }
        }

        function saveControls() {
          localStorage.setItem(controlStorageKey, JSON.stringify({
            level: brightnessMode,
            power: Number(powerControl.toFixed(2)),
            bloom: Number(bloomControl.toFixed(2)),
            blur: Number(blurControl.toFixed(2)),
            label: Number(labelControl.toFixed(2)),
            time: Number(timeControl.toFixed(2))
          }));
        }

        function syncControls() {
          profile = lightProfiles[brightnessMode] || lightProfiles.boost;
          root.dataset.mode = brightnessMode;
          root.style.setProperty("--label-size", labelControl.toFixed(2));
          root.style.setProperty("--time-size", timeControl.toFixed(2));
          applyLight(lastSeenLuma);
          saveControls();
        }

        function setLevel(level) {
          brightnessMode = resolveMode(String(level));
          syncControls();
        }

        function stepLevel(amount) {
          const levels = ["night", "normal", "day", "boost", "ultra"];
          const current = Math.max(0, levels.indexOf(brightnessMode));
          const next = clamp(current + amount, 0, levels.length - 1);
          setLevel(levels[next]);
        }

        function nudgeBloomBlur(amount) {
          bloomControl = clamp(bloomControl + amount, 0.65, 2.2);
          blurControl = clamp(blurControl + amount * 0.72, 0.65, 1.85);
          syncControls();
        }

        function handleControlKey(event) {
          const key = event.key;
          const code = event.code;
          const digit = code && code.startsWith("Numpad") ? code.replace("Numpad", "") : key;
          const handledKeys = ["0", "1", "2", "3", "4", "5", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", ".", "r", "R"];
          if (!handledKeys.includes(key) && !["Numpad0", "Numpad1", "Numpad2", "Numpad3", "Numpad4", "Numpad5", "NumpadDecimal"].includes(code)) return;
          event.preventDefault();

          if (digit === "1") setLevel(1);
          else if (digit === "2") setLevel(2);
          else if (digit === "3") setLevel(3);
          else if (digit === "4") setLevel(4);
          else if (digit === "5") setLevel(5);
          else if (key === "ArrowUp") stepLevel(1);
          else if (key === "ArrowDown") stepLevel(-1);
          else if (key === "ArrowRight") nudgeBloomBlur(0.12);
          else if (key === "ArrowLeft") nudgeBloomBlur(-0.12);
          else if (digit === "0" || key === "." || code === "NumpadDecimal") {
            manualPause = !manualPause;
            if (manualPause) {
              setPaused(true, "manual break");
            } else {
              absenceSince = 0;
              returnSince = performance.now();
              manualReleaseUntil = performance.now() + 1800;
              setPaused(false, "manual resume");
            }
          } else if (key === "r" || key === "R") {
            activeMs = 0;
            localStorage.removeItem(storageKey);
          }
        }

        function resolveMode(input) {
          if (input === "1" || input === "low" || input === "dim") return "night";
          if (input === "2" || input === "medium" || input === "mid") return "normal";
          if (input === "3" || input === "high" || input === "bright") return "day";
          if (input === "4" || input === "max" || input === "higher" || input === "boost") return "boost";
          if (input === "5" || input === "ultra" || input === "overdrive") return "ultra";
          if (input === "night" || input === "normal" || input === "day" || input === "boost" || input === "ultra") return input;
          return "boost";
        }

        function lerp(from, to, amount) {
          return from + (to - from) * amount;
        }

        function format(ms) {
          const total = Math.max(0, Math.floor(ms / 1000));
          const hours = Math.floor(total / 3600);
          const minutes = Math.floor((total % 3600) / 60);
          const seconds = total % 60;
          return [hours, minutes, seconds].map((part) => String(part).padStart(2, "0")).join(":");
        }

        function setPaused(next, reason) {
          if (paused === next) return;
          paused = next;
          label.textContent = paused ? "DESK TIME" : "DESK TIME";
          root.style.setProperty("--break-alpha", paused ? "0.76" : "0");
          status.value = paused ? `paused: ${reason || "away"}` : "running";
        }

        function applyLight(luma) {
          lastSeenLuma = luma;
          const darkness = clamp(1 - luma, 0, 1);
          const daylightLift = brightnessMode === "day" ? luma * 0.06 : 0;
          const core = clamp((lerp(profile.core[0], profile.core[1], darkness) + daylightLift) * powerControl, 0.10, 0.95);
          const wash = clamp((lerp(profile.wash[0], profile.wash[1], darkness) + daylightLift * 0.55) * powerControl, 0.04, 0.65);
          const bloom = clamp((lerp(profile.bloom[0], profile.bloom[1], darkness) + daylightLift * 0.8) * bloomControl * powerControl, 0.08, 1.25);
          const blur = clamp(lerp(profile.blur[0], profile.blur[1], darkness) * blurControl, 0.22, 1.45);
          const bloomBlur = clamp(lerp(profile.bloomBlur[0], profile.bloomBlur[1], darkness) * blurControl * bloomControl, 5.5, 44);
          const glow = clamp(lerp(profile.glow[0], profile.glow[1], darkness) * bloomControl * powerControl, 12, 190);
          const warmth = clamp(1 - darkness * 0.16, 0.82, 1);
          const [baseR, baseG, baseB] = profile.warm;
          root.style.setProperty("--projector-opacity", core.toFixed(3));
          root.style.setProperty("--core-alpha", core.toFixed(3));
          root.style.setProperty("--wash-alpha", wash.toFixed(3));
          root.style.setProperty("--bloom-alpha", (paused ? bloom * 0.9 : bloom).toFixed(3));
          root.style.setProperty("--blur-core", `${blur.toFixed(2)}px`);
          root.style.setProperty("--blur-bloom", `${bloomBlur.toFixed(2)}px`);
          root.style.setProperty("--glow", `${glow.toFixed(1)}px`);
          root.style.setProperty("--warm-r", Math.round(baseR + (1 - warmth) * 4));
          root.style.setProperty("--warm-g", Math.round(baseG + (1 - warmth) * 2));
          root.style.setProperty("--warm-b", Math.round(baseB - (1 - warmth) * 6));
        }

        function frameMetrics() {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const image = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = image.data;
          let lumaTotal = 0;
          let centerLumaTotal = 0;
          let centerCount = 0;
          let skinCount = 0;
          let centerR = 0;
          let centerG = 0;
          let centerB = 0;
          let edgeTotal = 0;
          let edgeCount = 0;
          let motionTotal = 0;
          const lumaFrame = new Uint8Array(canvas.width * canvas.height);

          for (let y = 0; y < canvas.height; y += 1) {
            for (let x = 0; x < canvas.width; x += 1) {
              const pixel = y * canvas.width + x;
              const offset = pixel * 4;
              const r = data[offset];
              const g = data[offset + 1];
              const b = data[offset + 2];
              const luma = Math.round(r * 0.2126 + g * 0.7152 + b * 0.0722);
              lumaFrame[pixel] = luma;
              lumaTotal += luma;

              if (x > canvas.width * 0.25 && x < canvas.width * 0.75 && y > canvas.height * 0.12 && y < canvas.height * 0.92) {
                centerCount += 1;
                centerLumaTotal += luma;
                centerR += r;
                centerG += g;
                centerB += b;
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                if (r > 45 && g > 28 && b > 18 && r > g * 1.04 && r > b * 1.16 && max - min > 13) {
                  skinCount += 1;
                }
                if (x > canvas.width * 0.25 + 1) {
                  edgeTotal += Math.abs(luma - lumaFrame[pixel - 1]);
                  edgeCount += 1;
                }
                if (lastLuma) {
                  motionTotal += Math.abs(luma - lastLuma[pixel]);
                }
              }
            }
          }

          lastLuma = lumaFrame;
          const averageLuma = lumaTotal / (canvas.width * canvas.height) / 255;
          const centerLuma = centerLumaTotal / centerCount / 255;
          const skin = skinCount / centerCount;
          const motion = motionTotal / Math.max(1, centerCount);
          const edge = edgeTotal / Math.max(1, edgeCount);
          const cr = centerR / centerCount / 255;
          const cg = centerG / centerCount / 255;
          const cb = centerB / centerCount / 255;

          return { averageLuma, centerLuma, skin, motion, edge, cr, cg, cb };
        }

        function updateBaseline(metrics, amount) {
          if (!baseline) {
            baseline = { ...metrics };
            baselineFrames = 1;
            return;
          }
          baseline.centerLuma = lerp(baseline.centerLuma, metrics.centerLuma, amount);
          baseline.skin = lerp(baseline.skin, metrics.skin, amount);
          baseline.edge = lerp(baseline.edge, metrics.edge, amount);
          baseline.cr = lerp(baseline.cr, metrics.cr, amount);
          baseline.cg = lerp(baseline.cg, metrics.cg, amount);
          baseline.cb = lerp(baseline.cb, metrics.cb, amount);
          baselineFrames += 1;
        }

        function chromaDelta(metrics) {
          if (!baseline) return 0;
          return Math.abs(metrics.cr - baseline.cr) + Math.abs(metrics.cg - baseline.cg) + Math.abs(metrics.cb - baseline.cb);
        }

        function scorePresence(metrics, facePresent) {
          if (!baseline || baselineFrames < 8) return 1;
          const skinRatio = baseline.skin > 0 ? metrics.skin / baseline.skin : metrics.skin > 0.012 ? 1 : 0;
          const edgeRatio = baseline.edge > 0 ? metrics.edge / baseline.edge : 0;
          const lumaDelta = Math.abs(metrics.centerLuma - baseline.centerLuma);
          const colorDelta = chromaDelta(metrics);
          let score = 0;

          if (facePresent) score += 0.82;
          if (skinRatio > 0.72 && metrics.skin > 0.006) score += 0.36;
          else if (skinRatio > 0.42 && metrics.skin > 0.004) score += 0.22;
          if (edgeRatio > 0.78) score += 0.18;
          else if (edgeRatio > 0.58) score += 0.10;
          if (colorDelta < 0.105 && lumaDelta < 0.16) score += 0.24;
          else if (colorDelta < 0.16 && lumaDelta < 0.22) score += 0.12;
          if (metrics.motion > 10.5) score += 0.18;

          return clamp(score, 0, 1);
        }

        async function detectFace() {
          if (!faceDetector || !cameraReady) return false;
          try {
            const faces = await faceDetector.detect(video);
            if (faces && faces.length > 0) {
              lastFaceAt = performance.now();
              return true;
            }
          } catch (_) {
            faceDetector = null;
          }
          return performance.now() - lastFaceAt < 2600;
        }

        async function sampleCamera() {
          if (sampleBusy || !cameraReady || video.readyState < 2) return;
          sampleBusy = true;
          try {
            const metrics = frameMetrics();
            const facePresent = await detectFace();
            applyLight(metrics.averageLuma);

            if (!autoPause || manualPause) {
              sampleBusy = false;
              return;
            }

            const now = performance.now();
            const baseReady = baselineFrames > 8;
            const rawScore = scorePresence(metrics, facePresent);
            presenceScore = lerp(presenceScore, rawScore, facePresent ? 0.58 : 0.42);
            const stableEmpty = baseReady && presenceScore < 0.42 && metrics.motion < 12.5;
            const strongReturn = facePresent || presenceScore > 0.52 || metrics.motion > 15;

            if (!paused && (facePresent || baselineFrames < 95 || presenceScore > 0.54)) {
              updateBaseline(metrics, facePresent ? 0.12 : 0.018);
            }

            if (stableEmpty) {
              absenceSince = absenceSince || now;
              returnSince = 0;
              if (now - absenceSince > pauseDelay) setPaused(true, "bathroom break");
            } else if (strongReturn) {
              returnSince = returnSince || now;
              absenceSince = 0;
              if (now - returnSince > resumeDelay) setPaused(false, "in frame");
            } else {
              absenceSince = 0;
              returnSince = 0;
            }
            status.value = `${paused ? "paused" : "running"} | camera ok | mode ${brightnessMode} | presence ${presenceScore.toFixed(2)} | ${cameraError}`;
          } finally {
            sampleBusy = false;
          }
        }

        async function pollHelper() {
          if (!helperEnabled || !autoPause || manualPause) return;
          try {
            const response = await fetch(`${helperUrl}?t=${Date.now()}`, { cache: "no-store" });
            if (!response.ok) throw new Error(`helper ${response.status}`);
            const data = await response.json();
            helperOnline = true;
            helperCameraOk = Boolean(data.camera_ok);
            helperPaused = Boolean(data.paused);

            if (helperCameraOk) {
              if (performance.now() > manualReleaseUntil || !helperPaused) {
                setPaused(helperPaused, "helper");
              }
            }

            status.value = helperCameraOk
              ? `${paused ? "paused" : "running"} | helper ok | presence ${Number(data.presence || 0).toFixed(2)}`
              : `helper online | ${data.error || "camera unavailable"}`;
            if (!helperCameraOk && !manualPause) {
              setPaused(false, "helper waiting");
            }
          } catch (_) {
            helperOnline = false;
            helperCameraOk = false;
            if (!cameraReady) status.value = "helper offline; start OBS Timer Helper";
          }
        }

        async function startCamera() {
          if (!cameraEnabled || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            cameraError = "camera unavailable";
            status.value = "camera unavailable; timer running";
            applyLight(syntheticBrightness);
            return;
          }
          try {
            if ("FaceDetector" in window) {
              faceDetector = new window.FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
            }
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: false,
              video: {
                width: { ideal: 320 },
                height: { ideal: 180 },
                frameRate: { ideal: 8, max: 12 },
                facingMode: "user"
              }
            });
            video.srcObject = stream;
            await video.play();
            cameraReady = true;
            cameraError = "";
            status.value = `camera sampler running | mode ${brightnessMode}`;
          } catch (error) {
            cameraError = error && error.name ? error.name : "camera blocked";
            status.value = `${cameraError}; timer running`;
            applyLight(syntheticBrightness);
          }
        }

        function tick(now) {
          const delta = now - lastTick;
          lastTick = now;
          if (!paused) {
            activeMs += delta;
          }
          const display = format(activeMs);
          timer.textContent = display;
          bloomTimer.textContent = display;
          root.style.setProperty("--break-alpha", paused ? "0.76" : "0");

          if (saveTimer && !demoMode && now - lastSave > 1200) {
            localStorage.setItem(storageKey, String(Math.floor(activeMs)));
            lastSave = now;
          }

          requestAnimationFrame(tick);
        }

        if (initialBreak) {
          root.style.setProperty("--break-alpha", "0.76");
        }

        window.addEventListener("keydown", handleControlKey);
        startCamera();
        pollHelper();
        setInterval(pollHelper, 450);
        setInterval(() => {
          if (cameraReady && !helperCameraOk) {
            sampleCamera();
          } else if (preview) {
            applyLight(syntheticBrightness);
          }
        }, 650);
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
